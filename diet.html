<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diet</title>

</head>

<body>

<header><h1>🍗 Diet Tracker</h1></header>

<nav>
 <a href="index.html" >Home</a>
  <a href="workout.html" target="_blank">Workout</a>
  <a href="diet.html" >Diet</a>
  <a href="progress.html" target="_blank">Progress</a>
  <a href="calendar.html" target="_blank">Calendar</a>
</nav>

<main>

<section>
  <div class="card">
    <input id="calories" type="number" placeholder="Calories">
    <input id="protein" type="number" placeholder="Protein">
    <button onclick="addDiet()">Add</button>
  </div>

  <div class="card">
    <h3>Total</h3>
    <p id="total"></p>
  </div>
  <div class="card">
  <h3>Protein Progress</h3>
  <div class="progress-bar">
    <div id="progressFill"></div>
  </div>
</div>
</section>

<aside>
  <div class="card">
    <h3>Tip</h3>
    <p>Hit your protein goal 🍗</p>
  </div>
</aside>

</main>

<footer>FitTrack</footer>

<script src="script.js"></script>
</body>
